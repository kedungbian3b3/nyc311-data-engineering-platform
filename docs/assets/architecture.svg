    <text x="1005" y="365" fill="#FFF7ED" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="800">Dashboard Web</text>
    <text x="1005" y="391" fill="#FED7AA" font-family="Inter,Segoe UI,Arial" font-size="14">KPI + charts + table</text>
  </g>

