    <text x="383" y="306" fill="#ECFEFF" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="700">Ingestion API</text>
    <text x="383" y="332" fill="#CFFAFE" font-family="Inter,Segoe UI,Arial" font-size="14">Fetch + normalize + upsert</text>
  </g>

  <g filter="url(#shadow)">
