    <text x="703" y="258" fill="#E0F2FE" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="800">PostgreSQL</text>
    <text x="700" y="287" fill="#94A3B8" font-family="Inter,Segoe UI,Arial" font-size="14">raw.nyc_311_service_requests</text>
    <text x="700" y="311" fill="#94A3B8" font-family="Inter,Segoe UI,Arial" font-size="14">staging + marts schemas</text>
  </g>

  <g filter="url(#shadow)">
