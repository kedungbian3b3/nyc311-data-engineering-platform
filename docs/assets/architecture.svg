    <text x="394" y="523" fill="#F0FDF4" font-family="Inter,Segoe UI,Arial" font-size="20" font-weight="800">Airflow Orchestration</text>
    <text x="394" y="552" fill="#BBF7D0" font-family="Inter,Segoe UI,Arial" font-size="15">DAG: ingest API → dbt debug → dbt run → dbt test</text>
