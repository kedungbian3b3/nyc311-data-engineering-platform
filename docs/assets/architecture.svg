<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38BDF8" />
    </marker>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
  <text x="64" y="64" fill="#E5E7EB" font-family="Inter,Segoe UI,Arial" font-size="34" font-weight="800">NYC 311 Data Engineering Platform</text>
  <text x="64" y="98" fill="#94A3B8" font-family="Inter,Segoe UI,Arial" font-size="16">Public API ingestion → PostgreSQL raw/staging/marts → dbt quality → Airflow orchestration → dashboard</text>

  <g filter="url(#shadow)">
    <rect x="64" y="160" width="210" height="112" rx="20" fill="#1E293B" stroke="#334155"/>
    <text x="90" y="202" fill="#E0F2FE" font-family="Inter,Segoe UI,Arial" font-size="18" font-weight="700">NYC Open Data</text>
    <text x="90" y="230" fill="#94A3B8" font-family="Inter,Segoe UI,Arial" font-size="14">311 Service Requests</text>
    <text x="90" y="252" fill="#94A3B8" font-family="Inter,Segoe UI,Arial" font-size="14">Socrata JSON API</text>
  </g>

  <g filter="url(#shadow)">
