    <text x="1005" y="193" fill="#EEF2FF" font-family="Inter,Segoe UI,Arial" font-size="19" font-weight="800">dbt</text>
    <text x="1005" y="219" fill="#C7D2FE" font-family="Inter,Segoe UI,Arial" font-size="14">staging, marts, tests</text>
  </g>

  <g filter="url(#shadow)">
